name: Backend lint
description: Lint the backend workspace.

runs:
  using: composite
  steps:
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: backend/.nvmrc
        cache: npm
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: backend
      run: npm ci

    - name: Run Biome
      shell: bash
      working-directory: backend
      run: |
        npx @biomejs/biome --version
        npm run lint -- --error-on-warnings .
