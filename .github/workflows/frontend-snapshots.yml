name: Frontend Update Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to update snapshots on.
        required: true
        default: main

env:
  AUTHOR_NAME: 'github-actions[bot]'
  AUTHOR_EMAIL: '41898282+github-actions[bot]@users.noreply.github.com'
  COMMIT_MESSAGE: |
    Updated frontend test snapshots

    Co-authored-by: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.branch }}
  cancel-in-progress: true

jobs:
  update:
    name: update snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: lumiflow-ai
          repositories: lumiflow-oss

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: ${{ inputs.branch }}

      - name: Run frontend snapshot update
        uses: ./frontend/.github/actions/update-snapshots
        with:
          ref: ${{ inputs.branch }}
