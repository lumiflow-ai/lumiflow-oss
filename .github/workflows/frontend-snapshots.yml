name: Frontend Update Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to update snapshots on.
        required: true
        default: main

env:
  AUTHOR_NAME: 'github-actions[bot]'
  AUTHOR_EMAIL: '41898282+github-actions[bot]@users.noreply.github.com'
  COMMIT_MESSAGE: |
    Updated frontend test snapshots

    Co-authored-by: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.branch }}
  cancel-in-progress: true

jobs:
  update:
    name: update snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: lumiflow-ai
          repositories: lumiflow-oss

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: ${{ inputs.branch }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure Git
        shell: bash
        run: |
          git config --global user.name "${{ env.AUTHOR_NAME }}"
          git config --global user.email "${{ env.AUTHOR_EMAIL }}"

      - name: Install dependencies
        shell: bash
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        shell: bash
        working-directory: frontend
        run: npx --no playwright install --with-deps --only-shell

      - name: Update snapshot tests
        shell: bash
        working-directory: frontend
        run: npm run test:snapshot:update

      - name: Check for changes
        id: check_changes
        shell: bash
        run: |
          CHANGED_FILES=$(git status --porcelain frontend | awk '{print $2}')
          if [ "${CHANGED_FILES:+x}" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"

            echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGED_FILES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "changed_count=$(echo "$CHANGED_FILES" | wc -l)" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        shell: bash
        env:
          REF: ${{ inputs.branch }}
        run: |
          git add frontend
          git commit --no-verify -m "${{ env.COMMIT_MESSAGE }}"
          git push origin "$REF"

      - name: Summarize
        shell: bash
        run: |
          if [[ "${{ steps.check_changes.outputs.changes }}" == "true" ]]; then
            echo "### Snapshots Updated" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Successfully updated **${{ steps.check_changes.outputs.changed_count }}** snapshot(s) on \`${{ inputs.branch }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### Changed Files:" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "${{ steps.check_changes.outputs.changed_files }}" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### No Snapshot Updates Required" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Tests ran successfully but no snapshots needed updating." >> "$GITHUB_STEP_SUMMARY"
          fi
