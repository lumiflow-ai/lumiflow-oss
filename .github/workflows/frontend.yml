name: Frontend

on:
  pull_request:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/frontend.yml
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/frontend.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run frontend build
        uses: ./frontend/.github/actions/build

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run frontend lint
        uses: ./frontend/.github/actions/lint

  test-unit:
    name: unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run frontend unit tests
        uses: ./frontend/.github/actions/test-unit

  test-snapshots:
    name: snapshot tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run frontend snapshot tests
        uses: ./frontend/.github/actions/test-snapshots

      - name: Report Results
        uses: actions/github-script@v8
        if: failure() && github.event_name == 'pull_request'
        continue-on-error: true
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body:
            `### Snapshot Updates May Be Required

            Run the \`Frontend Update Snapshots\` workflow to regenerate them.`
            })
