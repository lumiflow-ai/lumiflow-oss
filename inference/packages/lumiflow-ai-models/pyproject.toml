[project]
name = "lumiflow-ai-models"
version = "0.1.0"
description = "AI models for Lumiflow"
readme = "README.md"
authors = []
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.60.0",
    "boto3>=1.40.1",
    "boto3-stubs>=1.40.1",
    "google-cloud-aiplatform>=1.106.0",
    "humanize>=4.12.3",
    "json-repair>=0.48.0",
    "ollama>=0.5.1",
    "openai>=1.98.0",
    "pandas>=2.3.1",
    "pandas-stubs>=2.3.0.250703",
    "pydantic>=2.11.7",
    "pydantic-settings>=2.7.0",
    "pytest>=8.4.1",
]

[build-system]
requires = ["uv_build>=0.8.4,<0.9.0"]
build-backend = "uv_build"

[tool.setuptools.package-data]
"lumiflow-ai-models" = ["data/**/*"]
