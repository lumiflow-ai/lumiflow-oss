name: Job Service test
description: Test the job-service workspace.

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: job-service/.nvmrc
        cache: npm
        cache-dependency-path: job-service/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: job-service
      run: npm ci

    - name: Run tests
      shell: bash
      working-directory: job-service
      run: npm run test

